<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="headingArea">
        <p class="heading">Task Tracker</p>
    </div>
    <div class="inputLayout">
        <div class="inputArea">
            <input type="text" id="textInput" class="textInput" placeholder="Write a task">
        </div>
        <div class="taskBtnArea">
            <button class="taskBtn" id="taskBtn">Add Task</button>
        </div>
    </div>
        <div class="displayOutput">
            <ul id="taskList" type="none"></ul>
        </div>
    <script src="script.js"></script>
</body>
</html>
